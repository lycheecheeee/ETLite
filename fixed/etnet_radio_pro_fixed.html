<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>etnet Radio Pro — 每節目獨立 Jingle</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>/* 同之前完整 CSS */</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 text-white">

<!-- Player -->
<div class="glass max-w-md mx-auto mt-12 p-8 rounded-3xl">
  <div class="live-dot mb-4"></div>
  <div id="now-playing" class="text-center mb-8">
    <div id="host-avatar" class="w-24 h-24 mx-auto rounded-2xl flex items-center justify-center text-4xl font-black mb-4" style="--glow-color:rgba(124,58,237,0.6);background:linear-gradient(135deg,#7c3aed,#6d28d9);box-shadow:0 0 30px var(--glow-color)">
      🧠
    </div>
    <p id="prog-title" class="text-xl font-black mb-1">實戰交易廳</p>
    <p id="host-name" class="text-lg font-bold mb-1">子誠</p>
    <p id="host-style" class="text-sm text-yellow-300">智者派 • ON AIR</p>
  </div>

  <audio id="player" preload="auto"></audio>
  <canvas id="visualizer" width="320" height="60" class="w-full rounded-xl mb-6 bg-black bg-opacity-30"></canvas>

  <div class="controls flex items-center gap-4 mb-6">
    <button onclick="prevTrack()" class="w-14 h-14 rounded-xl bg-white bg-opacity-20 hover:bg-opacity-30">⏮</button>
    <button onclick="togglePlay()" id="play-btn" class="flex-1 py-4 px-8 bg-gradient-to-r from-yellow-400 to-orange-400 hover:from-yellow-300 text-black font-black text-xl rounded-2xl shadow-2xl">
      ▶ 播放
    </button>
    <button onclick="nextTrack()" class="w-14 h-14 rounded-xl bg-white bg-opacity-20 hover:bg-opacity-30">⏭</button>
  </div>

  <div class="flex items-center gap-3 text-sm">
    <span>🔈</span>
    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.7" class="flex-1 h-2 bg-white bg-opacity-20 rounded-lg appearance-none cursor-pointer">
    <span id="volume-display">70%</span>
  </div>
</div>

<!-- Playlist -->
<div class="max-w-2xl mx-auto mt-12">
  <h2 class="text-2xl font-black text-center mb-8">📻 全天節目表 (含獨立 Jingle)</h2>
  <div id="playlist" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
  </div>
</div>

<script>
// ── 9個 Jingle + 主持聲音
const PROGRAMS = [
  {id:1,name:"醒晨財經",host:"Mina",emoji:"👩‍💼",jingle:"jingles/prog_1_mina_jingle.wav",voice:"hosts/mina_sample.wav",color:"#3b82f6"},
  {id:2,name:"實戰交易廳",host:"子誠",emoji:"🧠",jingle:"jingles/prog_2_zicheng_jingle.wav",voice:"hosts/zicheng_sample.wav",color:"#7c3aed"},
  {id:3,name:"午市急救室",host:"海峰",emoji:"😎",jingle:"jingles/prog_3_haifeng_jingle.wav",voice:"hosts/haifeng_sample.wav",color:"#f59e0b"},
  {id:4,name:"下半場博弈",host:"子誠",emoji:"📈",jingle:"jingles/prog_4_zicheng_jingle.wav",voice:"hosts/zicheng_sample.wav",color:"#8b5cf6"},
  {id:5,name:"收市華爾街",host:"子誠",emoji:"🗽",jingle:"jingles/prog_5_zicheng_jingle.wav",voice:"hosts/zicheng_sample.wav",color:"#ec4899"},
  {id:6,name:"財富學堂",host:"Ray",emoji:"📚",jingle:"jingles/prog_6_ray_jingle.wav",voice:"ray_sample.wav",color:"#10b981"},
  {id:7,name:"投資者會客室",host:"Vee",emoji:"🎤",jingle:"jingles/prog_7_vee_jingle.wav",voice:"vee_sample.wav",color:"#f97316"},
  {id:8,name:"美股連線",host:"Mina",emoji:"🇺🇸",jingle:"jingles/prog_8_mina_jingle.wav",voice:"hosts/mina_sample.wav",color:"#06b6d4"},
  {id:9,name:"心靈避風塘",host:"聯武",emoji:"🌙",jingle:"jingles/prog_9_lianwu_jingle.wav",voice:"lianwu_sample.wav",color:"#a855f7"}
];

let currentTrack = 1;
let isPlaying = false;
const player = document.getElementById("player");
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

// ── 控制
function togglePlay() {
  if (isPlaying) {
    player.pause();
    document.getElementById("play-btn").innerHTML = '▶ 播放';
  } else {
    loadTrack(currentTrack);
    player.play();
    document.getElementById("play-btn").innerHTML = '⏸ 暫停';
  }
  isPlaying = !isPlaying;
}

function loadTrack(id) {
  const prog = PROGRAMS.find(p => p.id === id);
  if (!prog) return;

  // 先播 jingle，再播主持
  player.src = prog.jingle;
  setTimeout(() => {
    player.src = prog.voice;
  }, 10000); // jingle 10s 後播主持

  updateDisplay(prog);
}

function updateDisplay(prog) {
  document.getElementById("prog-title").textContent = prog.name;
  document.getElementById("host-name").textContent = prog.host;
  document.getElementById("host-avatar").textContent = prog.emoji;
  document.getElementById("host-avatar").style.background = `linear-gradient(135deg,${prog.color},${prog.color}88)`;
}

// ── 可視化
function drawVisualizer() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const time = player.currentTime || 0;
  const bars = 40;
  const barWidth = canvas.width / bars;

  for (let i = 0; i < bars; i++) {
    const height = 10 + Math.sin(time * 0.1 + i * 0.2) * 25 * (isPlaying ? 1 : 0.3);
    const hue = 200 + i * 2;
    ctx.fillStyle = `hsla(${hue}, 70%, 50%, 0.8)`;
    ctx.fillRect(i * barWidth, canvas.height - height, barWidth * 0.8, height);
  }
  requestAnimationFrame(drawVisualizer);
}

drawVisualizer();

// ── Playlist UI
document.getElementById("playlist").innerHTML = PROGRAMS.map(p => 
  `<div onclick="loadTrack(${p.id})" class="glass p-4 rounded-xl cursor-pointer hover:scale-105 transition-all border hover:border-white border-opacity-0 hover:opacity-100" style="border-color:${p.color}33">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl font-black" style="background:${p.color}44">${p.emoji}</div>
      <div>
        <p class="font-bold">${p.name}</p>
        <p class="text-xs text-white text-opacity-60">${p.host}</p>
      </div>
    </div>
  </div>`
).join("");

document.getElementById("volume-slider").addEventListener("input", e => {
  player.volume = e.target.value;
  document.getElementById("volume-display").textContent = Math.round(e.target.value * 100) + "%";
});
</script>
</body>
</html>
