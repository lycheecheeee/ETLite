# Prometheus Configuration for Net 仔 Podcast System
# ===========================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'netzai-monitor'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional)
# rule_files:
#   - "rules/*.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Net 仔 Backend API
  - job_name: 'netzai-backend'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          environment: 'development'
    metrics_path: '/metrics'

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
        labels:
          service: 'postgres'

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
        labels:
          service: 'redis'

  # MinIO Exporter
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: 'minio'

  # Celery Flower (task monitoring)
  - job_name: 'celery-flower'
    static_configs:
      - targets: ['flower:5555']
        labels:
          service: 'celery'

  # Node Exporter (system metrics - optional)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node_exporter:9100']
  #       labels:
  #         service: 'node'
